name: CI

on:
    pull_request:
        types:
            - opened
            - synchronize
            - reopened

permissions:
    contents: read

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Enable Corepack
              run: corepack enable

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - parallel:
                  - name: Format
                    run: pnpm format:check

                  - name: Lint
                    run: pnpm lint

                  - name: TypeCheck
                    run: pnpm typecheck

                  - name: Backend Test
                    run: pnpm test:back

                  - name: Frontend Test
                    run: |
                        pnpm exec playwright install
                        pnpm test:front

                  - name: Build
                    run: pnpm build
